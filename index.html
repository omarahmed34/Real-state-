<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapCom | Real Estate Management</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">

    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS and JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Core CSS -->
    <link rel="stylesheet" href="index.css?v=1.1.1">
    <link rel="stylesheet" href="layout.css?v=1.1.1">
    <link rel="stylesheet" href="components.css?v=1.1.1">
    <link rel="stylesheet" href="pages.css?v=1.1.1">

    <style>
        #error-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050a15;
            color: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <div id="error-overlay">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem; color: #d4af37; margin-bottom: 1.5rem;"></i>
        <h1>System Startup Failed</h1>
        <p id="error-msg" style="opacity: 0.7; max-width: 500px; margin-bottom: 2rem;">A technical error occurred while
            loading the application.</p>
        <button onclick="localStorage.clear(); location.reload();"
            style="padding: 1rem 2.5rem; background: #d4af37; border: none; border-radius: 8px; color: black; font-weight: 700; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(212,175,55,0.3);">RESET
            & REPAIR SYSTEM</button>
    </div>

    <script>
        // Emergency Error Catcher (runs before modules)
        window.onerror = function (msg, url, line, col, error) {
            const overlay = document.getElementById('error-overlay');
            const msgEl = document.getElementById('error-msg');
            if (overlay) {
                overlay.style.display = 'flex';
                msgEl.textContent = msg + (line ? ' (Line ' + line + ')' : '');
            }
            return false;
        };
    </script>

    <!-- Application Logic -->
    <script type="module" src="app.js?v=1.1.9"></script>
</body>

</html>
